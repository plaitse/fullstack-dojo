name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dojo
          POSTGRES_PASSWORD: dojo
          POSTGRES_DB: fullstack_dojo_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U dojo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dojo:dojo@localhost:5433/fullstack_dojo_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @fullstack-dojo/api prisma:generate

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm --filter @fullstack-dojo/api test

      - name: Push database schema
        run: pnpm --filter @fullstack-dojo/api exec prisma db push --config ./prisma/prisma.config.ts --force-reset
        env:
          PRISMA_USER_CONSENT_FOR_DANGEROUS_AI_ACTION: yes

      - name: Integration tests
        run: pnpm --filter @fullstack-dojo/api test:integration
